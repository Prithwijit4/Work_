<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Prithwijit</title>

    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <!-- LOADER -->
    <div id="loader">
        <div id="lpct">00<span style="font-size:.55em;color:#e84a2f">%</span></div>
        <div id="lbar-w">
            <div id="lbar"></div>
        </div>
        <div id="llbl">Loading portfolio</div>
    </div>

    <!-- NAV -->
    <nav>
        <div class="nav-logo">Prithwijit</div>
        <div class="nav-links">
            <a href="#">Intro</a>
            <a href="#">Stuff I Made</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <!-- HERO -->
    <section id="hero">
        <div id="hw">
            <div id="tf">
                <span class="row">
                    <span class="sand">BUILDING</span>
                </span>
                <span class="row">
                    <span class="red">THINGS</span>
                    <span class="sand"> THAT</span>
                </span>
                <span class="row">
                    <span class="sand">JUST </span>
                    <span class="red">WORK</span>
                </span>
            </div>
            <!-- <div class="hero-sub" id="hsub">
                Interfaces should feel human.
            </div> -->
        </div>

    </section>
    <!-- WORK -->
    <section id="work">
        <figure>
            <h3>Selected work</h3>
            <div class="parent">
                <aside id="left">

                </aside>
                <aside id="right">
                    <div class="top"></div>
                    <div class="bottom">
                        <div class="inner-left">
                            <div class="inner-top"></div>
                            <div class="inner-bottom"></div>
                        </div>
                        <div class="inner-right"></div>
                    </div>
                </aside>
            </div>
        </figure>
    </section>

    <!-- CANVAS -->
    <canvas id="cvs"></canvas>

    <!-- CORNER BUTTON -->
    <div id="cbtn">
        <svg viewBox="0 0 24 24">
            <path d="M12 3v13M5 10l7 7 7-7" />
            <path d="M5 20h14" />
        </svg>
    </div>

    <div class="grain"></div>
    <div id="cur"></div>


    <!-- About section -->
    <section>
        4
    </section>


    <script src="./assets/js/script.js"></script>

</body>

</html>
